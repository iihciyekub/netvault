name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip build uv
      - run: python scripts/check-version-consistency.py
      - run: uv lock --check && uv lock --project packages/netvault-server --check
      - run: python -m pip install -e ".[dev]" -e packages/netvault-server
      - run: ruff check src packages tests
      - run: pytest --cov=src/netvault --cov=packages/netvault-server/src/netvault_server --cov-fail-under=60
      - run: python -m build .
      - run: python -m build packages/netvault-server
