name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: netvault-release
  cancel-in-progress: false

jobs:
  release:
    if: "${{ startsWith(github.event.head_commit.message, 'release: NetVault ') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build uv
      - name: Verify release identity
        id: version
        run: |
          version="$(python scripts/check-version-consistency.py --print-version)"
          subject="$(git log -1 --pretty=%s)"
          expected="release: NetVault ${version}"
          if [[ "${subject}" != "${expected}" ]]; then
            echo "Expected commit subject '${expected}', got '${subject}'" >&2
            exit 1
          fi
          python scripts/check-version-consistency.py --tag "v${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
      - run: uv lock --check && uv lock --project packages/netvault-server --check
      - run: python -m pip install -e ".[dev]" -e packages/netvault-server
      - run: ruff check src packages tests
      - run: pytest --cov=src/netvault --cov=packages/netvault-server/src/netvault_server --cov-fail-under=60
      - run: python -m build . && python -m build packages/netvault-server
      - name: Tag and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          notes_file="${RUNNER_TEMP}/release-notes.md"
          python scripts/check-version-consistency.py --print-release-notes > "${notes_file}"

          if git show-ref --verify --quiet "refs/tags/${TAG}"; then
            target="$(git rev-list -n 1 "${TAG}")"
            if [[ "${target}" != "${GITHUB_SHA}" ]]; then
              echo "${TAG} already points to ${target}, not ${GITHUB_SHA}" >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "NetVault ${VERSION}" "${GITHUB_SHA}"
            git push origin "${TAG}"
          fi

          assets=(
            dist/netvault-"${VERSION}".tar.gz
            dist/netvault-"${VERSION}"-py3-none-any.whl
            packages/netvault-server/dist/netvault_server-"${VERSION}".tar.gz
            packages/netvault-server/dist/netvault_server-"${VERSION}"-py3-none-any.whl
          )
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${assets[@]}" --clobber
          else
            gh release create "${TAG}" "${assets[@]}" \
              --verify-tag \
              --latest \
              --title "NetVault ${VERSION}" \
              --notes-file "${notes_file}"
          fi
