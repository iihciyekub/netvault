services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netvault}
      POSTGRES_USER: ${POSTGRES_USER:-netvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netvault} -d ${POSTGRES_DB:-netvault}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netvault-internal

  server:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NETVAULT_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-netvault}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-netvault}
      NETVAULT_STORAGE_ROOT: /netvault/storage
      NETVAULT_SECRET_KEY: ${NETVAULT_SECRET_KEY:?NETVAULT_SECRET_KEY is required}
      NETVAULT_BASE_PATH: ${NETVAULT_BASE_PATH:-/nv}
      NETVAULT_SECURE_COOKIES: "true"
      NETVAULT_MAX_UPLOAD_FILES: ${NETVAULT_MAX_UPLOAD_FILES:-25}
      NETVAULT_MAX_PDF_BYTES: ${NETVAULT_MAX_PDF_BYTES:-99614720}
      NETVAULT_MAX_BATCH_BYTES: ${NETVAULT_MAX_BATCH_BYTES:-99614720}
      NETVAULT_MAX_ZIP_FILES: ${NETVAULT_MAX_ZIP_FILES:-100}
      NETVAULT_MAX_ZIP_BYTES: ${NETVAULT_MAX_ZIP_BYTES:-1073741824}
      NETVAULT_BOOTSTRAP_ADMIN: ${NETVAULT_BOOTSTRAP_ADMIN:-admin}
      NETVAULT_BOOTSTRAP_ADMIN_PASSWORD: ${NETVAULT_BOOTSTRAP_ADMIN_PASSWORD:?NETVAULT_BOOTSTRAP_ADMIN_PASSWORD is required}
      NETVAULT_CROSSREF_MAILTO: ${NETVAULT_CROSSREF_MAILTO:-yongjian.li@polyu.edu.hk}
      NETVAULT_UPLOAD_RATE_PER_HOUR: ${NETVAULT_UPLOAD_RATE_PER_HOUR:-5000}
      NETVAULT_DOWNLOAD_RATE_PER_HOUR: ${NETVAULT_DOWNLOAD_RATE_PER_HOUR:-1200}
    volumes:
      - ./storage:/netvault/storage
    init: true
    stop_grace_period: 5m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    mem_limit: 1g
    cpus: 2.0
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netvault.rule=Host(`${APP_HOST:?APP_HOST is required}`) && PathPrefix(`${NETVAULT_BASE_PATH:-/nv}`)"
      - "traefik.http.routers.netvault.entrypoints=web,websecure"
      - "traefik.http.routers.netvault.priority=75"
      - "traefik.http.routers.netvault.tls=true"
      - "traefik.http.routers.netvault.tls.certresolver=letsencrypt"
      - "traefik.http.routers.netvault.middlewares=netvault-strip"
      - "traefik.http.middlewares.netvault-strip.stripprefix.prefixes=${NETVAULT_BASE_PATH:-/nv}"
      - "traefik.http.services.netvault.loadbalancer.server.port=8000"
      - "traefik.http.routers.netvault-web-redirect.rule=Host(`${APP_HOST:?APP_HOST is required}`) && PathPrefix(`/web`)"
      - "traefik.http.routers.netvault-web-redirect.entrypoints=web,websecure"
      - "traefik.http.routers.netvault-web-redirect.priority=90"
      - "traefik.http.routers.netvault-web-redirect.tls=true"
      - "traefik.http.routers.netvault-web-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.netvault-web-redirect.middlewares=netvault-web-redirect"
      - "traefik.http.routers.netvault-web-redirect.service=noop@internal"
      - "traefik.http.middlewares.netvault-web-redirect.redirectregex.regex=^https?://([^/]+)/web(.*)"
      - "traefik.http.middlewares.netvault-web-redirect.redirectregex.replacement=https://$${1}${NETVAULT_BASE_PATH:-/nv}/web$${2}"
      - "traefik.http.middlewares.netvault-web-redirect.redirectregex.permanent=true"
    networks:
      - netvault-internal
      - iiaide-data

volumes:
  postgres-data:

networks:
  netvault-internal:
  iiaide-data:
    external: true
