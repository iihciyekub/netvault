{% extends "base.html" %}
{% block title %}Login - NetVault{% endblock %}
{% block heading %}Log in to NetVault{% endblock %}
{% block content %}
<section class="auth">
  {% if error %}<div class="alert" role="alert">{{ error }}</div>{% endif %}
  <form method="post" action="{{ path_for('/web/login') }}" class="form auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Username <input name="username" autocomplete="username" required></label>
    <label>Password <input name="password" type="password" autocomplete="current-password" required></label>
    <button class="primary" type="submit"><i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i><span data-button-label>Login</span></button>
  </form>
</section>
{% endblock %}
