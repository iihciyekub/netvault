<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}NetVault{% endblock %}</title>
    <link rel="stylesheet" href="{{ path_for('/static/styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ path_for('/web') }}">NetVault</a>
      {% if user %}
      <nav>
        <a href="{{ path_for('/web') }}">Dashboard</a>
        <a href="{{ path_for('/web/pdfs') }}">PDFs</a>
        <a href="{{ path_for('/web/upload') }}">Upload</a>
        <a href="{{ path_for('/web/download') }}">Download</a>
      </nav>
      <form method="post" action="{{ path_for('/web/logout') }}" class="logout">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit">Logout {{ user.username }}</button>
      </form>
      {% endif %}
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
