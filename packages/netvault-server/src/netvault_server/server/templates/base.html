<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}NetVault{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='24' rx='6' fill='%23f7f7f5' stroke='%23d6d6d1'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-family='Arial' font-size='13' font-weight='700' fill='%23111'%3EN%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ path_for('/static/styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ path_for('/web') }}">
        <span class="brand-mark">N</span>
        <span>NetVault</span>
      </a>
      {% if user %}
      <nav>
        <a href="{{ path_for('/web') }}">Home</a>
        <a href="{{ path_for('/web/pdfs') }}">Search</a>
        <a href="{{ path_for('/web/upload') }}">Upload</a>
        <a href="{{ path_for('/web/download') }}">Download</a>
      </nav>
      <form method="post" action="{{ path_for('/web/logout') }}" class="logout">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit">Logout {{ user.username }}</button>
      </form>
      {% endif %}
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
