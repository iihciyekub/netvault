[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "netvault-server"
version = "0.5.8"
description = "FastAPI server, admin CLI, and web UI for NetVault."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "sqlalchemy>=2.0.0",
  "psycopg[binary]>=3.2.0",
  "pydantic-settings>=2.4.0",
  "python-multipart>=0.0.9",
  "passlib[bcrypt]>=1.7.4",
  "bcrypt<4.1",
  "python-jose[cryptography]>=3.3.0",
  "pypdf>=5.0.0",
  "typer>=0.12.0",
  "requests>=2.32.0",
  "rich>=13.7.0",
  "tomli-w>=1.0.0",
  "jinja2>=3.1.0",
]

[project.scripts]
netvault-admin = "netvault_server.cli.admin:app"

[tool.hatch.build.targets.wheel]
packages = ["src/netvault_server"]
